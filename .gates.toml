# cc-orchestrator gate definition -- the AUTHORITATIVE source of truth for the
# pre-push / pre-PR gates (run locally; CI enforces them). Read by
# scripts/gate-runner.py; the /prep-pr, /handle-review, /review-stack commands
# and the optional pre-push-hook.sh all delegate to that runner.
#
# Schema: skills/orchestrate/templates/gates.toml.md
# This mirrors the `## Gates` block in CLAUDE.md (kept in sync as human-readable
# documentation). Form B (enumerate): each step runs in order; the runner stops
# at the first required-step failure.

[prep_pr]

  [[prep_pr.steps]]
  name = "shellcheck"
  run = "shellcheck scripts/orchestrate-guard.sh scripts/orchestrate-steer.sh scripts/orchestrate-context-meter.sh scripts/orchestrate-feedback.sh scripts/orchestrate-status.sh scripts/uat-autobuild.sh scripts/ship-gate-preflight.sh scripts/gh-api-get.sh scripts/gh-codeql-dismiss.sh scripts/gh-resolve-thread.sh scripts/gh-comment.sh scripts/gh-codeql-autofix.sh scripts/gh-delete-branch.sh scripts/stale-branch-sweep.sh scripts/codoki-quota-watch.sh scripts/pr-watch.sh scripts/issue-watch.sh scripts/pr-unreplied-comments.sh scripts/pr-read-comments.sh scripts/reply-comment.sh scripts/resolve-threads.sh scripts/cleanup-worktree.sh scripts/patch-coverage.sh scripts/pr-codeql-autofixes.sh scripts/safe-push.sh scripts/pre-push-hook.sh"
  skip_if_absent = "shellcheck"

  [[prep_pr.steps]]
  name = "ruff"
  run = "ruff check --select F,E741 scripts/orchestrate-*.py scripts/orchestrate_schemas.py scripts/planner_classify.py scripts/gate-runner.py scripts/prefs-coverage.py test-orchestrate-*.py test-planner-classify.py test-gh-wrappers.py test-ship-gate-preflight.py test-pr-unreplied-comments.py test-pr-read-comments.py test-safe-push.py test-pr-watch.py test-issue-watch.py test-version-lockstep.py test-stale-branch-sweep.py test-codoki-quota-watch.py test-gate-runner.py test-prefs-coverage.py"
  skip_if_absent = "ruff"

  [[prep_pr.steps]]
  name = "guard-self-test"
  run = "./scripts/orchestrate-guard.sh --self-test"

  [[prep_pr.steps]]
  name = "steer-self-test"
  run = "./scripts/orchestrate-steer.sh --self-test"

  [[prep_pr.steps]]
  name = "ctxmeter-self-test"
  run = "./scripts/orchestrate-context-meter.sh --self-test"

  [[prep_pr.steps]]
  name = "test-orchestrate-guard"
  run = "python3 test-orchestrate-guard.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-steer"
  run = "python3 test-orchestrate-steer.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-context-meter"
  run = "python3 test-orchestrate-context-meter.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-resources"
  run = "python3 test-orchestrate-resources.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-setup"
  run = "python3 test-orchestrate-setup.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-feedback"
  run = "python3 test-orchestrate-feedback.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-status"
  run = "python3 test-orchestrate-status.py"

  [[prep_pr.steps]]
  name = "test-orchestrate-schemas"
  run = "python3 test-orchestrate-schemas.py"

  [[prep_pr.steps]]
  name = "test-planner-classify"
  run = "python3 test-planner-classify.py"

  [[prep_pr.steps]]
  name = "test-gh-wrappers"
  run = "python3 test-gh-wrappers.py"

  [[prep_pr.steps]]
  name = "test-ship-gate-preflight"
  run = "python3 test-ship-gate-preflight.py"

  [[prep_pr.steps]]
  name = "test-pr-unreplied-comments"
  run = "python3 test-pr-unreplied-comments.py"

  [[prep_pr.steps]]
  name = "test-pr-read-comments"
  run = "python3 test-pr-read-comments.py"

  [[prep_pr.steps]]
  name = "test-safe-push"
  run = "python3 test-safe-push.py"

  [[prep_pr.steps]]
  name = "test-pr-watch"
  run = "python3 test-pr-watch.py"

  [[prep_pr.steps]]
  name = "test-issue-watch"
  run = "python3 test-issue-watch.py"

  [[prep_pr.steps]]
  name = "test-version-lockstep"
  run = "python3 test-version-lockstep.py"

  [[prep_pr.steps]]
  name = "test-stale-branch-sweep"
  run = "python3 test-stale-branch-sweep.py"

  [[prep_pr.steps]]
  name = "test-codoki-quota-watch"
  run = "python3 test-codoki-quota-watch.py"

  [[prep_pr.steps]]
  name = "test-gate-runner"
  run = "python3 test-gate-runner.py"

  [[prep_pr.steps]]
  name = "test-prefs-coverage"
  run = "python3 test-prefs-coverage.py"

[merge_pr]
# cc-orchestrator is a stdlib-only shell/Python repo with no coverage service;
# patch coverage is advisory / N/A.
coverage_advisory = false
