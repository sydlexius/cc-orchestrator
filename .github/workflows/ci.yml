# CI for cc-orchestrator: the deterministic gates that guard the security floor and the
# resource registry. Conventions mirrored from sydlexius/stillwater (pinned action SHAs,
# least-privilege permissions, persist-credentials: false, concurrency).
#
# Runs on BOTH ubuntu and macos: the guard ships on macOS (BSD `stat -f`) but must also
# work on Linux (GNU `stat -c`), and the first CI run caught exactly that divergence -
# so both platform branches are validated here. shellcheck/ruff are platform-independent,
# so they run once (on ubuntu); the harnesses + self-test run on both.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: gates (${{ matrix.os }})
    # Route the ubuntu leg to a self-hosted runner ONLY when all three hold:
    #   - it is the ubuntu-latest matrix leg (macOS has no self-hosted host),
    #   - the event is an EXPLICIT allowlist of trusted triggers: push or
    #     workflow_dispatch only (never pull_request / pull_request_target, so a
    #     fork PR can never reach self-hosted infra - an allowlist, not a negation,
    #     so a future trigger added to `on:` does not silently leak through),
    #   - the repo variable SELF_HOSTED_LINUX == 'true' (the kill switch).
    # Otherwise fall back to the GitHub-hosted matrix.os. Unset the variable to
    # instantly revert everything to GitHub-hosted with no code change.
    runs-on: >-
      ${{ (matrix.os == 'ubuntu-latest'
           && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
           && vars.SELF_HOSTED_LINUX == 'true')
          && fromJSON('["self-hosted","linux","x64","unraid"]')
          || matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      # Platform-independent lint: run once, on Linux. (jq is preinstalled on both runners.)
      # shellcheck is pinned to v0.11.0. On GitHub-hosted runners we run it via the official
      # koalaman image, digest-pinned (linux/amd64) for immutability per the repo SHA-pin
      # convention. On self-hosted runners there is no Docker daemon by design, so we use the
      # shellcheck v0.11.0 binary baked into the outatime-runner image - keep that image's
      # SHELLCHECK_VERSION in lockstep with this digest. Either path predicts a clean local
      # `shellcheck` v0.11.0 gate (the SC2015 drift that motivated #165).
      - name: shellcheck v0.11.0 (security guard + runtime scripts)
        if: runner.os == 'Linux'
        run: |
          scripts=(
            scripts/orchestrate-guard.sh scripts/orchestrate-steer.sh scripts/orchestrate-feedback.sh
            scripts/uat-autobuild.sh scripts/ship-gate-preflight.sh scripts/gh-api-get.sh
            scripts/gh-codeql-dismiss.sh scripts/gh-resolve-thread.sh scripts/gh-comment.sh
            scripts/gh-codeql-autofix.sh scripts/gh-delete-branch.sh scripts/stale-branch-sweep.sh
            scripts/codoki-quota-watch.sh scripts/pr-watch.sh scripts/pr-unreplied-comments.sh
            scripts/pr-read-comments.sh scripts/reply-comment.sh scripts/resolve-threads.sh
            scripts/cleanup-worktree.sh scripts/patch-coverage.sh scripts/pr-codeql-autofixes.sh
            scripts/safe-push.sh scripts/pre-push-hook.sh
          )
          if [ "${{ runner.environment }}" = "self-hosted" ]; then
            # No Docker daemon here, so lint with the shellcheck baked into the
            # outatime-runner image. Assert the pinned version so a stale image fails
            # loudly rather than silently linting with a different version.
            want=0.11.0
            have=$(shellcheck --version 2>/dev/null | awk '/^version:/{print $2}')
            if [ "$have" != "$want" ]; then
              echo "::error::self-hosted shellcheck '$have' != pinned '$want'; rebuild the outatime-runner image (SHELLCHECK_VERSION)"
              exit 1
            fi
            shellcheck "${scripts[@]}"
          else
            docker run --rm -v "$GITHUB_WORKSPACE:/mnt" -w /mnt \
              koalaman/shellcheck@sha256:b9389b73c8f26f710a7171cb7d8848a34a9c1e07a7865e727c9ec4ce99f9a83f \
              "${scripts[@]}"
          fi

      - name: ruff (F,E741)
        if: runner.os == 'Linux'
        run: ruff check --select F,E741 scripts/orchestrate-resources.py scripts/orchestrate-setup.py scripts/planner_classify.py scripts/gate-runner.py test-orchestrate-guard.py test-orchestrate-steer.py test-orchestrate-resources.py test-orchestrate-setup.py test-orchestrate-feedback.py test-planner-classify.py test-gh-wrappers.py test-ship-gate-preflight.py test-pr-unreplied-comments.py test-pr-read-comments.py test-safe-push.py test-pr-watch.py test-version-lockstep.py test-stale-branch-sweep.py test-codoki-quota-watch.py test-gate-runner.py

      # Platform-sensitive: run on BOTH macOS (BSD stat) and Linux (GNU stat).
      # Must invoke via ./ so the self-test's "$0" re-invocation resolves
      # (bash orchestrate-guard.sh would make $0 a bare name -> 127).
      - name: guard self-test
        run: ./scripts/orchestrate-guard.sh --self-test

      # Advisory steering hook (#95): self-test is platform-sensitive (BSD/GNU stat in
      # marker_active), so run on both runners alongside the guard self-test.
      - name: steer self-test
        run: ./scripts/orchestrate-steer.sh --self-test

      - name: harness - guard
        run: python3 test-orchestrate-guard.py

      - name: harness - steer
        run: python3 test-orchestrate-steer.py

      - name: harness - resources
        run: python3 test-orchestrate-resources.py

      # Pure classification logic (planner role, #11) - platform-independent, runs on both.
      - name: harness - planner-classify
        run: python3 test-planner-classify.py

      # P3-F gh-* wrappers (#24): black-box, stubs gh via PATH - platform-independent.
      - name: harness - gh-wrappers
        run: python3 test-gh-wrappers.py

      # Ship-gate oracle (#110): stubs gh + pr-unreplied-comments.sh via PATH/$HOME -
      # deterministic, host-independent, platform-independent. Runs on both.
      - name: harness - ship-gate-preflight
        run: python3 test-ship-gate-preflight.py

      # pr-unreplied-comments.sh (#132 outside-diff count + --audit; #93 staleness):
      # stubs gh (and GraphQL) via PATH, applies --jq with the real jq. Host-independent.
      - name: harness - pr-unreplied-comments
        run: python3 test-pr-unreplied-comments.py

      # pr-read-comments.sh optional [owner/repo] positional (#144): stubs gh via
      # PATH + a call-log, asserts slug-vs-comment-id disambiguation. Host-independent.
      - name: harness - pr-read-comments
        run: python3 test-pr-read-comments.py

      # safe-push.sh branch-arg validation (#35): stubs git via PATH, records pushes.
      - name: harness - safe-push
        run: python3 test-safe-push.py

      # pr-watch.sh CR-skip + Codoki settlement wiring (#34, #110): stubs gh + the
      # Codoki oracle; PR_WATCH_POLL_INTERVAL=0 drives the loop deterministically.
      - name: harness - pr-watch
        run: python3 test-pr-watch.py

      # The setup/doctor harness exercises HOST-COUPLED wiring (settings cascade, tmux,
      # guard execution, git repo state). On a fresh macOS runner doctor behaves differently
      # than on the dev mac or the ubuntu runner - env-coupling on the runner, not a
      # shipped-code bug - so run it on Linux only. macOS still covers the portability-
      # sensitive guard (incl. the BSD stat -f branch) + resources harnesses + self-test
      # above. The macOS-runner doctor divergence is tracked separately for root-cause.
      - name: harness - setup
        if: runner.os == 'Linux'
        run: python3 test-orchestrate-setup.py

      # Maildir feedback store (#149): temp-dir isolated, stubs nothing (real bash
      # mktemp/mv), incl. a 25-way concurrency test. Host-independent.
      - name: harness - feedback
        run: python3 test-orchestrate-feedback.py

      # Version lockstep: SKILL.md **Version** == plugin.json "version". Platform-independent.
      - name: harness - version-lockstep
        run: python3 test-version-lockstep.py

      # stale-branch-sweep.sh (#137) + codoki-quota-watch.sh (#70): stub gh/git via
      # PATH, host-independent. Wired here for parity with the CLAUDE.md gate list
      # (the #138 PR added the harnesses to CLAUDE.md but not to this workflow).
      - name: harness - stale-branch-sweep
        run: python3 test-stale-branch-sweep.py

      - name: harness - codoki-quota-watch
        run: python3 test-codoki-quota-watch.py

      # gate-runner.py (#169): builds throwaway git repos in temp dirs, drives
      # .gates.toml Form A/B + the fail-open fallback chain via a controlled PATH.
      # Host-independent, platform-independent.
      - name: harness - gate-runner
        run: python3 test-gate-runner.py
