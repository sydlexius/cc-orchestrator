# CI for cc-orchestrator: the deterministic gates that guard the security floor and the
# resource registry. Conventions mirrored from sydlexius/stillwater (pinned action SHAs,
# least-privilege permissions, persist-credentials: false, concurrency).
#
# Runs on BOTH ubuntu and macos: the guard ships on macOS (BSD `stat -f`) but must also
# work on Linux (GNU `stat -c`), and the first CI run caught exactly that divergence -
# so both platform branches are validated here. shellcheck/ruff are platform-independent,
# so they run once (on ubuntu); the harnesses + self-test run on both.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      # Platform-independent lint: run once, on Linux. (jq is preinstalled on both runners.)
      - name: shellcheck (security guard + runtime scripts)
        if: runner.os == 'Linux'
        run: shellcheck scripts/orchestrate-guard.sh scripts/uat-autobuild.sh scripts/ship-gate-preflight.sh scripts/gh-api-get.sh scripts/gh-codeql-dismiss.sh scripts/gh-resolve-thread.sh scripts/gh-comment.sh scripts/gh-codeql-autofix.sh scripts/gh-delete-branch.sh scripts/pr-watch.sh scripts/pr-unreplied-comments.sh scripts/pr-read-comments.sh scripts/reply-comment.sh scripts/resolve-threads.sh scripts/cleanup-worktree.sh scripts/patch-coverage.sh scripts/pr-codeql-autofixes.sh scripts/safe-push.sh

      - name: ruff (F,E741)
        if: runner.os == 'Linux'
        run: ruff check --select F,E741 scripts/orchestrate-resources.py scripts/orchestrate-setup.py scripts/planner_classify.py test-orchestrate-guard.py test-orchestrate-resources.py test-orchestrate-setup.py test-planner-classify.py test-gh-wrappers.py test-ship-gate-preflight.py test-version-lockstep.py

      # Platform-sensitive: run on BOTH macOS (BSD stat) and Linux (GNU stat).
      # Must invoke via ./ so the self-test's "$0" re-invocation resolves
      # (bash orchestrate-guard.sh would make $0 a bare name -> 127).
      - name: guard self-test
        run: ./scripts/orchestrate-guard.sh --self-test

      - name: harness - guard
        run: python3 test-orchestrate-guard.py

      - name: harness - resources
        run: python3 test-orchestrate-resources.py

      # Pure classification logic (planner role, #11) - platform-independent, runs on both.
      - name: harness - planner-classify
        run: python3 test-planner-classify.py

      # P3-F gh-* wrappers (#24): black-box, stubs gh via PATH - platform-independent.
      - name: harness - gh-wrappers
        run: python3 test-gh-wrappers.py

      # Ship-gate oracle (#110): stubs gh + pr-unreplied-comments.sh via PATH/$HOME -
      # deterministic, host-independent, platform-independent. Runs on both.
      - name: harness - ship-gate-preflight
        run: python3 test-ship-gate-preflight.py

      # The setup/doctor harness exercises HOST-COUPLED wiring (settings cascade, tmux,
      # guard execution, git repo state). On a fresh macOS runner doctor behaves differently
      # than on the dev mac or the ubuntu runner - env-coupling on the runner, not a
      # shipped-code bug - so run it on Linux only. macOS still covers the portability-
      # sensitive guard (incl. the BSD stat -f branch) + resources harnesses + self-test
      # above. The macOS-runner doctor divergence is tracked separately for root-cause.
      - name: harness - setup
        if: runner.os == 'Linux'
        run: python3 test-orchestrate-setup.py

      # Version lockstep: SKILL.md **Version** == plugin.json "version". Platform-independent.
      - name: harness - version-lockstep
        run: python3 test-version-lockstep.py
